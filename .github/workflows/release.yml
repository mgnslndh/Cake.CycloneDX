# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release
on:
  push:
    tags: ['v*']

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    runs-on: windows-latest
    environment: Production
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Install .NET 10 SDK (required for CycloneDX tool v6.x)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
      - name: Install CycloneDX tool
        run: dotnet tool install -g CycloneDX --version 6.1.0
      - name: Build & Pack
        run: dotnet run --project build/Build.csproj -- --target All --verbosity Diagnostic
      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Release
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet run --project build/Build.csproj -- --target Release

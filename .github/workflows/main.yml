# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI
on:
  push:
    branches: [main]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Install .NET 10 SDK (required for CycloneDX tool v6.x)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
      - name: Install CycloneDX tool
        run: dotnet tool install -g CycloneDX --version 6.1.0
      - name: Build Cake.CycloneDX
        run: dotnet run --project build/Build.csproj -- --target All --verbosity Diagnostic

